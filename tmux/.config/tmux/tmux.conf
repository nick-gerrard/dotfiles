# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g history-limit 50000

# Vim Keybindings
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane Resizing
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Copy Mode
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded"

# catppuccin mocha
# Colors
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#89dceb"
thm_black="#181825"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f38ba8"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#585b70"

# Pane borders — subtle, not distracting
set -g pane-active-border-style "fg=${thm_blue}"
set -g pane-border-style "fg=${thm_gray}"
set -g pane-border-lines single

# Status bar
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=${thm_black},fg=${thm_fg}"

# Left: session name only, compact
set -g status-left-length 20
set -g status-left "#[fg=${thm_magenta},bold] #S #[fg=${thm_black4}]│ "

# Right: minimal — hostname stripped, just clock
set -g status-right-length 40
set -g status-right "#[fg=${thm_black4}]#{?window_zoomed_flag, zoom,} #[fg=${thm_blue}]%a %H:%M "

# Window tabs — clean, no clutter
set -g window-status-format "#[fg=${thm_black4}] #I:#W "
set -g window-status-current-format "#[fg=${thm_blue},bold] #I:#W "
set -g window-status-separator ""

# Message / command prompt styling
set -g message-style "bg=${thm_gray},fg=${thm_yellow}"
set -g message-command-style "bg=${thm_gray},fg=${thm_yellow}"

