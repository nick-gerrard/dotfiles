# ── General ───────────────────────────────────────────────────────────────────
config-version = 2
start-at-login = true
after-startup-command = []
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

persistent-workspaces = ["1", "2", "3"]
# ── Gaps ────────────────────────────────────────────────────────────────────── [gaps] inner.horizontal = 8
[gaps]
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

# ── Default layout ────────────────────────────────────────────────────────────
[workspace-to-monitor-force-assignment]
# automatically-unhide-macos-hidden-apps = false
# ── Key bindings ──────────────────────────────────────────────────────────────
[mode.main.binding]
# Open ghostty with alt-enter
alt-enter = 'exec-and-forget open -n -a Ghostty'

# Balance the current workspace
alt-t = 'balance-sizes'

# Focus (navigate between windows)
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

alt-ctrl-h = 'workspace prev'
alt-ctrl-l = 'workspace next'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Splits
alt-b = 'join-with right'
alt-v = 'join-with down'

# Fullscreen
alt-f = 'fullscreen'

# Float / unfloat
alt-shift-f = 'layout floating tiling'
alt-slash = 'layout tiles horizontal vertical'

#Move
alt-shift-tab = 'workspace-back-and-forth'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'

# Move window to workspace
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']

# Reload config
alt-shift-r = 'reload-config'
alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width +50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width -50'
enter = 'mode main'
esc = 'mode main'
